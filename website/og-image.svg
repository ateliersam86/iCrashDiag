<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0c10"/>
      <stop offset="100%" stop-color="#0f1118"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="iconbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1f2e"/>
      <stop offset="100%" stop-color="#252840"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="card-clip">
      <rect x="560" y="80" width="580" height="470" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Orange glow blob left -->
  <circle cx="160" cy="340" r="220" fill="#F97316" opacity="0.06" filter="url(#glow)"/>

  <!-- LEFT SIDE — branding -->

  <!-- App icon background -->
  <rect x="60" y="120" width="88" height="88" rx="22" fill="url(#iconbg)"/>
  <rect x="60" y="120" width="88" height="88" rx="22" fill="none" stroke="rgba(249,115,22,0.3)" stroke-width="1.5"/>

  <!-- Stethoscope icon (simplified SVG path) -->
  <g transform="translate(104, 164)" fill="none" stroke="url(#orange)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- stethoscope head circle -->
    <circle cx="0" cy="-18" r="7" stroke="url(#orange)" stroke-width="2.2"/>
    <!-- tube body -->
    <path d="M-7 -11 C-14 0 -14 14 0 18 C14 14 14 0 7 -11"/>
    <!-- ear tips -->
    <line x1="-7" y1="-20" x2="-7" y2="-28"/>
    <line x1="7" y1="-20" x2="7" y2="-28"/>
    <circle cx="-7" cy="-29" r="2" fill="#F97316" stroke="none"/>
    <circle cx="7" cy="-29" r="2" fill="#F97316" stroke="none"/>
    <!-- chest piece -->
    <circle cx="0" cy="19" r="4" fill="url(#orange)" stroke="none"/>
  </g>

  <!-- App name -->
  <text x="60" y="248" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Helvetica, sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="-1">iCrashDiag</text>

  <!-- Tagline -->
  <text x="60" y="290" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Helvetica, sans-serif" font-size="20" fill="rgba(148,163,184,1)" letter-spacing="0">iPhone Crash Log Analyzer</text>

  <!-- Feature pills -->
  <rect x="60" y="330" width="146" height="32" rx="16" fill="rgba(249,115,22,0.12)" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
  <text x="133" y="351" font-family="-apple-system, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#fb923c" text-anchor="middle">267 Patterns</text>

  <rect x="218" y="330" width="126" height="32" rx="16" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="281" y="351" font-family="-apple-system, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#a5b4fc" text-anchor="middle">100% Offline</text>

  <rect x="356" y="330" width="154" height="32" rx="16" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <text x="433" y="351" font-family="-apple-system, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#86efac" text-anchor="middle">macOS Native</text>

  <!-- Price tag -->
  <text x="60" y="420" font-family="-apple-system, Helvetica, sans-serif" font-size="16" fill="rgba(100,116,139,1)">One-time · $9.99 · No subscription</text>

  <!-- URL -->
  <text x="60" y="490" font-family="-apple-system, 'SF Mono', monospace" font-size="15" fill="rgba(249,115,22,0.7)" letter-spacing="0.5">icrashdiag.pages.dev</text>

  <!-- RIGHT SIDE — app mockup card -->
  <rect x="562" y="82" width="576" height="466" rx="15" fill="#111318" filter="url(#card-shadow)"/>
  <rect x="562" y="82" width="576" height="466" rx="15" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Card header bar -->
  <rect x="562" y="82" width="576" height="44" rx="15" fill="#161920"/>
  <rect x="562" y="108" width="576" height="18" fill="#161920"/>
  <rect x="562" y="124" width="576" height="2" fill="rgba(255,255,255,0.05)"/>

  <!-- Traffic lights -->
  <circle cx="591" cy="104" r="6" fill="#FF5F57"/>
  <circle cx="611" cy="104" r="6" fill="#FEBC2E"/>
  <circle cx="631" cy="104" r="6" fill="#28C840"/>

  <!-- Window title -->
  <text x="850" y="109" font-family="-apple-system, Helvetica, sans-serif" font-size="13" fill="rgba(148,163,184,0.7)" text-anchor="middle">iCrashDiag</text>

  <!-- Sidebar strip -->
  <rect x="562" y="126" width="160" height="422" fill="#0d0f14" rx="0"/>
  <rect x="562" y="126" width="160" height="422" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Sidebar items -->
  <rect x="570" y="140" width="144" height="32" rx="8" fill="rgba(249,115,22,0.12)"/>
  <circle cx="586" cy="156" r="4" fill="#F97316"/>
  <text x="598" y="161" font-family="-apple-system, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#fb923c">Kernel Panic</text>
  <text x="688" y="161" font-family="-apple-system, Helvetica, sans-serif" font-size="11" fill="rgba(249,115,22,0.7)" text-anchor="end">12</text>

  <rect x="570" y="180" width="144" height="28" rx="6" fill="transparent"/>
  <circle cx="586" cy="194" r="4" fill="rgba(148,163,184,0.4)"/>
  <text x="598" y="199" font-family="-apple-system, Helvetica, sans-serif" font-size="12" fill="rgba(148,163,184,0.8)">Jetsam</text>
  <text x="688" y="199" font-family="-apple-system, Helvetica, sans-serif" font-size="11" fill="rgba(148,163,184,0.5)" text-anchor="end">8</text>

  <rect x="570" y="214" width="144" height="28" rx="6" fill="transparent"/>
  <circle cx="586" cy="228" r="4" fill="rgba(148,163,184,0.4)"/>
  <text x="598" y="233" font-family="-apple-system, Helvetica, sans-serif" font-size="12" fill="rgba(148,163,184,0.8)">Watchdog</text>
  <text x="688" y="233" font-family="-apple-system, Helvetica, sans-serif" font-size="11" fill="rgba(148,163,184,0.5)" text-anchor="end">3</text>

  <rect x="570" y="248" width="144" height="28" rx="6" fill="transparent"/>
  <circle cx="586" cy="262" r="4" fill="rgba(148,163,184,0.4)"/>
  <text x="598" y="267" font-family="-apple-system, Helvetica, sans-serif" font-size="12" fill="rgba(148,163,184,0.8)">App Crash</text>
  <text x="688" y="267" font-family="-apple-system, Helvetica, sans-serif" font-size="11" fill="rgba(148,163,184,0.5)" text-anchor="end">7</text>

  <!-- Main content area -->
  <!-- Verdict banner -->
  <rect x="734" y="140" width="390" height="72" rx="10" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.25)" stroke-width="1"/>
  <text x="754" y="168" font-family="-apple-system, Helvetica, sans-serif" font-size="13" font-weight="700" fill="white">🔧 HARDWARE ISSUE DETECTED</text>
  <text x="754" y="188" font-family="-apple-system, Helvetica, sans-serif" font-size="11" fill="rgba(148,163,184,0.9)">NAND Flash Controller · 89% confidence</text>

  <!-- Probability bars -->
  <text x="734" y="238" font-family="-apple-system, Helvetica, sans-serif" font-size="10" font-weight="700" fill="rgba(100,116,139,1)" letter-spacing="0.8" text-transform="uppercase">PROBABLE CAUSES</text>

  <!-- Bar 1 -->
  <rect x="734" y="250" width="264" height="5" rx="2.5" fill="rgba(255,255,255,0.08)"/>
  <rect x="734" y="250" width="237" height="5" rx="2.5" fill="url(#orange)"/>
  <text x="734" y="270" font-family="-apple-system, Helvetica, sans-serif" font-size="11" fill="rgba(203,213,225,0.9)">NAND Flash Controller failure</text>
  <text x="1006" y="270" font-family="-apple-system, Helvetica, sans-serif" font-size="11" fill="rgba(249,115,22,0.9)" text-anchor="end">90%</text>

  <!-- Bar 2 -->
  <rect x="734" y="280" width="264" height="5" rx="2.5" fill="rgba(255,255,255,0.08)"/>
  <rect x="734" y="280" width="79" height="5" rx="2.5" fill="#fb923c" opacity="0.7"/>
  <text x="734" y="300" font-family="-apple-system, Helvetica, sans-serif" font-size="11" fill="rgba(203,213,225,0.9)">Logic board storage bus</text>
  <text x="1006" y="300" font-family="-apple-system, Helvetica, sans-serif" font-size="11" fill="rgba(249,115,22,0.6)" text-anchor="end">30%</text>

  <!-- Bar 3 -->
  <rect x="734" y="310" width="264" height="5" rx="2.5" fill="rgba(255,255,255,0.08)"/>
  <rect x="734" y="310" width="26" height="5" rx="2.5" fill="#fb923c" opacity="0.4"/>
  <text x="734" y="330" font-family="-apple-system, Helvetica, sans-serif" font-size="11" fill="rgba(203,213,225,0.9)">Software corruption</text>
  <text x="1006" y="330" font-family="-apple-system, Helvetica, sans-serif" font-size="11" fill="rgba(249,115,22,0.4)" text-anchor="end">10%</text>

  <!-- Divider -->
  <line x1="734" y1="350" x2="1122" y2="350" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Repair steps title -->
  <text x="734" y="372" font-family="-apple-system, Helvetica, sans-serif" font-size="10" font-weight="700" fill="rgba(100,116,139,1)" letter-spacing="0.8">REPAIR STEPS</text>

  <rect x="734" y="382" width="8" height="8" rx="2" fill="rgba(249,115,22,0.5)"/>
  <text x="750" y="391" font-family="-apple-system, Helvetica, sans-serif" font-size="11" fill="rgba(203,213,225,0.8)">Run iPhone Diagnostics (Settings → General)</text>

  <rect x="734" y="402" width="8" height="8" rx="2" fill="rgba(249,115,22,0.5)"/>
  <text x="750" y="411" font-family="-apple-system, Helvetica, sans-serif" font-size="11" fill="rgba(203,213,225,0.8)">DFU restore — rules out software corruption</text>

  <rect x="734" y="422" width="8" height="8" rx="2" fill="rgba(249,115,22,0.5)"/>
  <text x="750" y="431" font-family="-apple-system, Helvetica, sans-serif" font-size="11" fill="rgba(203,213,225,0.8)">Logic board NAND reballing if restore fails</text>

  <!-- Log list in content (middle column) -->
  <rect x="724" y="126" width="2" height="422" fill="rgba(255,255,255,0.05)"/>

  <!-- Log rows in middle strip between sidebar and detail -->
  <!-- We skip the middle column for simplicity since detail panel fills the space -->
</svg>
